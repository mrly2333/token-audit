services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: newapi_audit
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d newapi_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  audit-proxy:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:3007:3007"

volumes:
  pgdata:
