# Generate admin_password_hash with:
#   go run ./scripts/hash_password.go <your-password>
listen_addr: 0.0.0.0:3007
upstream_base: http://host.docker.internal:3005
web_base_path: /audit
postgres_dsn: postgres://audit:audit@postgres:5432/newapi_audit?sslmode=disable
hmac_secret: replace-with-a-long-random-secret
admin_username: admin
admin_password_hash: "$2a$12$replace-with-a-valid-bcrypt-hash"
max_body_bytes: 10485760
capture_paths:
  - /v1/chat/completions
  - /v1/responses
  - /v1/completions
  - /v1/embeddings
