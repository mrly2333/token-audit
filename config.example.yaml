# 使用下面的命令生成 admin_password_hash：
#   go run ./scripts/hash_password.go <你的密码>
listen_addr: 127.0.0.1:3007
upstream_base: http://127.0.0.1:3005
web_base_path: /audit
postgres_dsn: postgres://audit:audit@127.0.0.1:5432/newapi_audit?sslmode=disable
hmac_secret: replace-with-a-long-random-secret
admin_username: admin
admin_password_hash: "$2a$12$replace-with-bcrypt-hash"
max_body_bytes: 10485760
capture_paths:
  - /v1/chat/completions
  - /v1/responses
  - /v1/completions
  - /v1/embeddings
